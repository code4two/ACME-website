<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACME Software Lab</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>
</head>
<body>
    <header>
        <nav class="pt-4 flex justify-start font-medium container mx-12 px-6">
            <div>
                <h1 class="font-bold text-blue-900 text-2xl">ACME</h1>
                <!-- <small class="font-normal">Software lab.</small> -->
            </div>
        </nav>
        <section class="container mx-5 px-6 mt-8 mx-4">
            <div class="grid grid-cols-12 gap-18 container px-10 mb-10">
                <div class="col-span-6">
                    <div class="flex gap-2 font-semibold mb-4">
                        <div>
                            <a href="login.html"><i class="fa-solid fa-arrow-left"></i></a>
                        </div>
                        <div>
                            <a href="login.html">Back to login</a>
                        </div>
                    </div>
                    <h1 class="text-4xl font-semibold mb-4">Forgot your password?</h1>
                    <p class="mb-6 text-gray-700">
                        Don't worry, it happens to all of us. Enter your email below to recover your password
                    </p>
                    <form>
                        <div class="mb-5 relative">
                            <label class="absolute px-1 bg-white text-sm ml-3 -mt-2" for="Name">Email</label>
                            <input class="border border-gray-500 block py-2 px-4 w-full rounded focus:outline-none" type="email" placeholder="johndoe@gmail.com">
                        </div>
                    </form>
                    <div class="text-white font-medium bg-blue-900 py-2 rounded-sm block mt-6">
                        <a class="flex justify-center" href="verifycode.html">Submit</a>
                    </div>
                    <div class="text-center mt-3 mb-5">
                        <div class="relative my-12">
                            <p class="border-t-1 text-gray-400"></p>
                            <p class="text-gray-500 px-1 bg-white -mt-3 absolute ml-60">Or login with</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <div class="border border-blue-900 px-20 py-3 rounded-sm">
                            <a href="#"><i class="fa-brands fa-facebook text-blue-900"></i></a>
                        </div>
                        <div class="border border-blue-900 px-20 py-3 rounded-sm">
                            <a href="#"><i class="fa-brands fa-google text-red-900"></i></a>
                        </div>
                        <div class="border border-blue-900 px-20 py-3 rounded-sm">
                            <a href="#"><i class="fa-brands fa-apple"></i></a>
                        </div>
                    </div> 
                </div>
                <div class="col-span-6">
                    <img class="rounded-xl w-full h-130" src="images/t4.jpg" alt="">
                </div>
            </div>
        </section>
    </header>
</body>
</html>
