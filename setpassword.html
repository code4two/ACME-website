<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACME Software Lab</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>
</head>
<body>
    <header>
        <nav class="pt-4 flex justify-start font-medium container mx-12 px-6">
            <div>
                <h1 class="font-bold text-blue-900 text-2xl">ACME</h1>
                <!-- <small class="font-normal">Software lab.</small> -->
            </div>
        </nav>
        <section class="container mx-5 px-6 mt-8 mx-4">
            <div class="grid grid-cols-12 gap-18 container px-10 mb-10">
                <div class="col-span-6">
                    <h1 class="text-4xl font-semibold mb-4">Set a password</h1>
                    <p class="mb-8 text-gray-700">
                        Your previous password has been reseted. Please set a new password for your account.
                    </p>
                    <form>
                        <div class="mb-5 relative">
                            <label class="absolute px-1 bg-white text-sm ml-3 -mt-2" for="Name">Create Password</label>
                            <input class="border border-gray-500 block py-2 px-4 w-full rounded focus:outline-none" type="password" placeholder="77B9BM6X@@H&$k_">
                            <span class="absolute inset-y-0 right-0 pr-3 flex items-center">
                                <i class="fa-solid fa-eye-slash text-gray-700"></i>
                            </span>
                        </div>
                        <div class="mb-5 relative">
                            <label class="absolute px-1 bg-white text-sm ml-3 -mt-2" for="Name">Re-enter Password</label>
                            <input class="border border-gray-500 block py-2 px-4 w-full rounded focus:outline-none" type="password" placeholder="77B9BM6X@@H&$k_">
                            <span class="absolute inset-y-0 right-0 pr-3 flex items-center">
                                <i class="fa-solid fa-eye-slash text-gray-700"></i>
                            </span>
                        </div>
                    </form>
                    <div class="text-white font-medium bg-blue-900 py-2 rounded-sm block mt-6">
                        <a class="flex justify-center kosoko" href="#">Set Password</a>
                    </div>
                </div>
                <div class="col-span-6">
                    <img class="rounded-xl h-120 w-135" src="images/webdesign2.jpg" alt="">
                </div>
            </div>
        </section>
    </header>

    <script src="landingpage.js"></script>
</body>
</html>
