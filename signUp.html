<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACME Software Lab</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>
</head>
<body>
    <header>
        <nav class="pt-3 flex justify-end font-medium container px-12">
            <div>
                <h1 class="font-bold text-blue-900 text-xl md:text-2xl">ACME</h1>
            </div>
        </nav>
        <section class="container px-12 mt-1 md:px-6 md:px-6 md:mt-2 lg:px-2">
            <div class="md:container md:px-10 md:mb-4 md:grid md:grid-cols-12">
                <div class="md:col-span-6">
                    <img class="md:rounded-xl md:h-140 md:w-125 lg:w-110 xl:w-125 hidden md:block" src="images/Dance1.jpg" alt="">
                </div>
                <div class="md:col-span-6">
                    <div>
                        <h1 class="text-4xl font-semibold mb-4">Sign up</h1>
                        <p class="mb-6 text-gray-600">Let's get you all set up so you can access your personal account</p>
                    </div>
                    <form>
                        <div class="flex gap-4 mb-4">
                            <div class="relative">
                                <label class="absolute px-1 bg-white text-sm ml-3 -mt-2" for="Name">First Name</label>
                                <input class="border border-gray-500 block py-2 px-4 w-70 rounded focus:outline-none" type="text">
                            </div>
                            <div class="relative">
                                <label class="absolute px-1 bg-white text-sm ml-3 -mt-2" for="Name">Last Name</label>
                                <input class="border border-gray-500 block py-2 px-4 w-70 lg:w-75 rounded focus:outline-none" type="text">
                            </div>
                        </div>
                        <div class="flex gap-4 mb-4">
                            <div class="relative">
                                <label class="absolute px-1 bg-white text-sm ml-3 -mt-2" for="Name">Email</label>
                                <input class="border border-gray-500 block py-2 px-4 w-70 rounded focus:outline-none" type="email" placeholder="johndoe@gmail.com">
                            </div>
                            <div class="relative">
                                <label class="absolute px-1 bg-white text-sm ml-3 -mt-2" for="Name">Phone Number</label>
                                <input class="border border-gray-500 block py-2 px-4 w-70 lg:w-75 rounded focus:outline-none" type="numbers">
                            </div>
                        </div>
                        <div class="lg:flex lg:gap-4">
                            <div class="mb-4 relative w-full mx-w-sm lg:w-full">
                                <label class="absolute px-1 bg-white text-sm ml-3 -mt-2" for="Name">Password</label>
                                <input class="border border-gray-500 block py-2 px-4 w-full lg:w-70 rounded focus:outline-none" type="password">
                                <span class="absolute inset-y-0 right-0 pr-3 flex items-center">
                                    <i class="fa-solid fa-eye-slash text-gray-700"></i>
                                </span>
                            </div>
                            <div class="mb-2 relative">
                                <label class="absolute px-1 bg-white text-sm ml-3 -mt-2" for="Name">Confirm Password</label>
                                <input class="border border-gray-500 block py-2 px-4 w-full lg:w-75 rounded focus:outline-none" type="password">
                                <span class="absolute inset-y-0 right-0 pr-3 flex items-center lg:flex lg:items-center">
                                    <i class="fa-solid fa-eye-slash text-gray-700"></i>
                                </span>
                            </div>
                        </div>
                    </form>
                    <div class="flex gap-2">
                        <div>
                            <input type="checkbox" name="agree">
                        </div>
                        <div>
                            <p>I agree to all the <span class="text-red-500"><a href="#">Terms</a></span> and <span class="text-red-500"><a href="#">Property Policies</a></span></p>
                        </div>
                    </div>
                    <div class="text-white font-medium bg-blue-900 py-2 rounded-sm block my-3">
                        <a class="flex justify-center" href="#">Create account</a>
                    </div>
                    <div class="text-center">
                        <h4>Already have an account? <span class="text-red-500"><a href="login.html">Login</a></span></h4>
                        <div class="relative mt-8">
                            <p class="border-t-1 text-gray-400"></p>
                            <p class="text-gray-500 px-1 bg-white -mt-3 absolute ml-60">Or Sign up with</p>
                        </div>
                    </div>
                    <div class="flex gap-3 mt-10">
                        <div class="border border-blue-900 px-21 py-2 rounded-sm">
                            <a href="#"><i class="fa-brands fa-facebook text-blue-900"></i></a>
                        </div>
                        <div class="border border-blue-900 px-21 py-2 rounded-sm">
                            <a href="#"><i class="fa-brands fa-google text-red-900"></i></a>
                        </div>
                        <div class="border border-blue-900 px-21 py-2 rounded-sm">
                            <a href="#"><i class="fa-brands fa-apple"></i></a>
                        </div>
                    </div>
                </div>           
        </section>
    </header>
</body>
</html>
